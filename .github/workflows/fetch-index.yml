name: fetch-index
on:
  workflow_dispatch:
jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Download and commit index.html
        run: |
          curl -sSL "https://customer-assets.emergentagent.com/wingman/f1af71d9-46a7-4270-be09-2dd97a932723/attachments/bd9c366cf9344611add661d8ed1c9d6f_index.html" -o index.html
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Add index.html - main PWA app" || echo "No changes"
          git push
          git rm .github/workflows/fetch-index.yml
          git commit -m "Remove temporary workflow"
          git push
